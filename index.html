<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>𝐀𝐇𝐌𝐄𝐃 ANIME | إمبراطورية الأنمي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #000);
            font-family: 'Segoe UI', monospace;
            color: #f0f0f0;
            padding: 15px;
            min-height: 100vh;
        }
        /* نجوم متحركة */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 2px; height: 2px;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.5);}
        }
        .container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 10; }
        /* شاشة ترحيب */
        .splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #00aa33, #000);
            z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        .splash h1 { font-size: 2.5rem; background: linear-gradient(135deg, gold, #ff8800); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header {
            text-align: center;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #ffaa33;
        }
        .title { font-size: 2rem; background: linear-gradient(135deg, #ffcc44, #ff8844); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .search-bar input { flex: 1; padding: 12px 20px; border-radius: 60px; border: none; background: #1e1e2a; color: white; }
        .search-bar button { background: #ffaa33; border: none; padding: 0 20px; border-radius: 60px; font-weight: bold; cursor: pointer; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .cat-btn { background: #1f1f2f; border: 1px solid #ffaa33; padding: 8px 18px; border-radius: 40px; color: #ffaa33; cursor: pointer; }
        .cat-btn.active, .cat-btn:hover { background: #ffaa33; color: black; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; margin-top: 20px; }
        .anime-card { background: rgba(25, 25, 45, 0.85); border-radius: 28px; overflow: hidden; cursor: pointer; transition: 0.25s; border: 1px solid #2a2a3a; }
        .anime-card:hover { transform: translateY(-5px); border-color: #ffaa33; }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; }
        .anime-card h3 { padding: 12px; font-size: 0.9rem; text-align: center; color: #ffdd99; }
        .footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 0.7rem; color: #777; border-top: 1px solid #333; }
        .wizard-btn { position: fixed; bottom: 20px; right: 20px; background: linear-gradient(45deg, magenta, purple); border: none; border-radius: 50px; padding: 10px 15px; color: white; cursor: pointer; z-index: 200; }
        body.wizard { background: radial-gradient(circle at 30% 10%, #1a0033, #0a0015); }
        body.wizard .anime-card { background: rgba(255,0,255,0.15); border-color: magenta; }
        @media (max-width: 550px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .anime-card img { height: 210px; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="splash">
    <h1>🔥 HAKER AHMED 🔥</h1>
    <p style="color: gold;">حاكم المجال البرنس حمودي</p>
    <p style="color: #ffaa66;">إمبراطورية الأنمي الخرافية</p>
</div>

<div class="container">
    <div class="header">
        <div class="title">🕸 HAKER ANIME 🕸</div>
        <div class="sub">أكثر من 10,000 أنمي | جودة عالية | تحديث فوري</div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن أنمي...">
        <button id="searchBtn">بحث</button>
    </div>

    <div class="category-buttons" id="catButtons">
        <button class="cat-btn active" data-cat="trending">🔥 رائج الآن</button>
        <button class="cat-btn" data-cat="popular">🏆 الأعلى تقييمًا</button>
        <button class="cat-btn" data-cat="action">🎬 أكشن</button>
        <button class="cat-btn" data-cat="romance">💖 رومانسية</button>
        <button class="cat-btn" data-cat="fantasy">🧙 فانتازيا</button>
    </div>

    <div class="anime-grid" id="animeGrid">
        <div style="text-align:center; padding:50px;">⏳ جلب أقوى الأنميات...</div>
    </div>

    <div class="footer">
        © 2099 - حاكم المجال البرنس حمودي HAKER AHMED | جميع الحقوق محفوظة<br>
        💀 تحديث فوري | مميزات حصرية 💀
    </div>
</div>

<button class="wizard-btn" id="wizardBtn">🧙 وضع الساحر</button>

<script>
    // نجوم متحركة
    function createStars() {
        const starsDiv = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = Math.random() * 3 + 1 + 's';
            starsDiv.appendChild(star);
        }
    }
    createStars();

    // وضع الساحر
    let wizard = false;
    document.getElementById('wizardBtn').onclick = () => {
        wizard = !wizard;
        if(wizard) { document.body.classList.add('wizard'); document.getElementById('wizardBtn').innerHTML = '✨ عادي ✨'; alert('🧙 وضع الساحر مفعل'); }
        else { document.body.classList.remove('wizard'); document.getElementById('wizardBtn').innerHTML = '🧙 ساحر'; }
    };

    // جلب الأنمي من AniList API (GraphQL) - شغال 100%
    async function fetchAnime(category = 'trending', search = '') {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = '<div style="text-align:center; padding:50px;">⏳ جلب البيانات...</div>';
        
        let query = '';
        let variables = { page: 1, perPage: 20 };
        
        if (search) {
            query = `
                query ($search: String, $page: Int, $perPage: Int) {
                    Page(page: $page, perPage: $perPage) {
                        media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                            id, title { userPreferred }, coverImage { large }, episodes, averageScore
                        }
                    }
                }
            `;
            variables.search = search;
        } else {
            let sort = category === 'trending' ? 'TRENDING_DESC' : (category === 'popular' ? 'POPULARITY_DESC' : 'SCORE_DESC');
            let genre = '';
            if (category === 'action') genre = 'Action';
            if (category === 'romance') genre = 'Romance';
            if (category === 'fantasy') genre = 'Fantasy';
            
            query = `
                query ($page: Int, $perPage: Int, $sort: [MediaSort], $genre: String) {
                    Page(page: $page, perPage: $perPage) {
                        media(type: ANIME, sort: $sort, genre: $genre) {
                            id, title { userPreferred }, coverImage { large }, episodes, averageScore
                        }
                    }
                }
            `;
            variables.sort = sort;
            if (genre) variables.genre = genre;
        }
        
        try {
            let res = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables })
            });
            let data = await res.json();
            let media = data.data?.Page?.media || [];
            if (media.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:50px;">❌ لا توجد نتائج</div>';
                return;
            }
            displayAnime(media);
        } catch(err) {
            console.error(err);
            grid.innerHTML = '<div style="text-align:center; padding:50px;">❌ خطأ في الاتصال، تأكد من نتك</div>';
        }
    }
    
    function displayAnime(animeList) {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = '';
        animeList.forEach(anime => {
            let card = document.createElement('div');
            card.classList.add('anime-card');
            let titleText = anime.title?.userPreferred || 'بدون عنوان';
            let episodes = anime.episodes ? `📺 ${anime.episodes} حلقة` : '📺 عدد حلقات غير معروف';
            let score = anime.averageScore ? `⭐ ${anime.averageScore / 10}` : '⭐ لا يوجد';
            let imgUrl = anime.coverImage?.large || 'https://via.placeholder.com/200x260?text=No+Image';
            card.innerHTML = `<img src="${imgUrl}" loading="lazy"><h3>${titleText}</h3><p>${score} | ${episodes}</p>`;
            card.onclick = () => { alert(`🎬 ${titleText}\n⭐ التقييم: ${score}\n📺 ${episodes}\n🔗 سيتم إضافة رابط المشاهدة قريباً`); };
            grid.appendChild(card);
        });
    }
    
    // البحث والأزرار
    document.getElementById('searchBtn').onclick = () => {
        let q = document.getElementById('searchInput').value.trim();
        if(q) fetchAnime('', q);
        else fetchAnime('trending');
    };
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('searchBtn').click(); };
    
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let cat = btn.getAttribute('data-cat');
            document.getElementById('searchInput').value = '';
            fetchAnime(cat);
        };
    });
    
    // تحميل أولي
    fetchAnime('trending');
    
    // صندوق الكنز
    setTimeout(() => { alert('🎁 صندوق الكنز: أنمي "Solo Leveling" متاح الآن! 🎁'); }, 5000);
</script>
</body>
</html>
